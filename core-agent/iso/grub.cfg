# Aegis OS v0.1 GRUB config. Serial directives make the menu reachable over
# ttyS0 for headless/QEMU use; they fail harmlessly on hardware with no UART.
serial --unit=0 --speed=115200
terminal_input serial console
terminal_output serial console

set default=0
set timeout=3

menuentry "Install Aegis OS (NetInstaller)" {
    linux /boot/bzImage console=tty0 aegis.install nomodeset earlycon=efifb keep_bootcon
    initrd /boot/initramfs.gz
}

menuentry "Aegis OS v0.1 (Live Mode)" {
    linux /boot/bzImage console=tty0 nomodeset earlycon=efifb keep_bootcon
    initrd /boot/initramfs.gz
}

menuentry "Aegis OS v0.1 (Live Mode - serial console)" {
    linux /boot/bzImage console=ttyS0,115200
    initrd /boot/initramfs.gz
}
