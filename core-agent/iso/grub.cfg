# Aegis OS v0.1 GRUB config. Serial directives make the menu reachable over
# ttyS0 for headless/QEMU use; they fail harmlessly on hardware with no UART.
serial --unit=0 --speed=115200
terminal_input serial console
terminal_output serial console

set default=0
set timeout=3

# No nomodeset: the kernel now builds simpledrm (a KMS driver) to own the EFI
# framebuffer and provide a real, interactive tty0 under native UEFI. nomodeset
# would disable simpledrm and leave userspace with no console at all (the
# original "installer runs blind and hangs" bug). earlycon=efifb stays as an
# early-boot safety net before simpledrm takes over.
menuentry "Install Aegis OS (NetInstaller)" {
    linux /boot/bzImage console=tty0 earlycon=efifb aegis.install
    initrd /boot/initramfs.gz
}

menuentry "Update Aegis OS (sync system files from this ISO)" {
    linux /boot/bzImage console=tty0 earlycon=efifb aegis.update
    initrd /boot/initramfs.gz
}

menuentry "Aegis OS v0.1 (Live Mode)" {
    linux /boot/bzImage console=tty0 earlycon=efifb
    initrd /boot/initramfs.gz
}

menuentry "Aegis OS v0.1 (Live Mode - serial console)" {
    linux /boot/bzImage console=ttyS0,115200
    initrd /boot/initramfs.gz
}
