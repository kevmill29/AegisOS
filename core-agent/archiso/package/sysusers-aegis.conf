# The unprivileged kiosk user. systemd-sysusers creates it at boot (and the
# package scriptlet creates it in the image too). Groups give it what the kiosk
# needs without root: GPU (video/render), input devices, and audio.
u aegis - "Aegis Kiosk" /home/aegis /bin/bash
m aegis video
m aegis render
m aegis input
m aegis audio
m aegis wheel
