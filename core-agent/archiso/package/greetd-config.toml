# greetd drives the Aegis kiosk. `initial_session` autologins the unprivileged
# `aegis` user at boot (no greeter shown) straight into cage running the sphere.
#   cage -m extend : extend across all outputs (Windows-style). The frontend
#                    then places the sphere on the primary screen and clouds its
#                    light across the others, so it never splits on the seam.
#   cage -s        : allow VT switching, so Ctrl-Alt-F2 still reaches a console.
# If the session ever exits, `default_session` falls back to a text login.

[terminal]
vt = 1

[default_session]
command = "agreety --cmd /bin/bash"
user = "greeter"

[initial_session]
command = "cage -m extend -s -- /usr/bin/aegis-session"
user = "aegis"
